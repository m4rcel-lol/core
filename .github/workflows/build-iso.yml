name: Build ISO

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-iso-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build and Test ISO Images
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install toolchain and ISO dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gcc-x86-64-linux-gnu \
            binutils-x86-64-linux-gnu \
            grub-pc-bin \
            grub-common \
            grub-efi-amd64-bin \
            xorriso \
            mtools \
            cpio \
            xz-utils \
            qemu-system-x86

      - name: Show tool versions
        run: |
          x86_64-linux-gnu-gcc --version | head -n 1
          grub-mkrescue --version | head -n 1
          grub-mkimage --version | head -n 1
          xorriso --version | head -n 1
          qemu-system-x86_64 --version | head -n 1

      - name: Build BIOS release ISO
        run: |
          make clean
          bash tools/build-iso.sh \
            --arch=x86_64 \
            --variant=release \
            --output=out/release \
            --staging=staging \
            --initrd-compress=none \
            --jobs="$(nproc)"

      - name: Smoke test BIOS release ISO
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p test-logs
          shopt -s nullglob
          isos=(out/release/*.iso)
          if [ "${#isos[@]}" -eq 0 ]; then
            echo "No release ISO found in out/release"
            exit 1
          fi

          status=0
          timeout 90s qemu-system-x86_64 \
            -cdrom "${isos[0]}" \
            -boot d \
            -m 64M \
            -accel tcg,thread=multi \
            -smp 2 \
            -serial stdio \
            -display none \
            -monitor none \
            -no-reboot \
            -no-shutdown \
            > test-logs/qemu-release.log 2>&1 || status=$?

          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            cat test-logs/qemu-release.log
            exit "$status"
          fi

          required_markers=(
            "booting..."
            "CORE: BIST passed"
            "CORE: init complete"
          )

          for marker in "${required_markers[@]}"; do
            if ! grep -Fq "$marker" test-logs/qemu-release.log; then
              echo "Missing boot marker: $marker"
              echo
              cat test-logs/qemu-release.log
              exit 1
            fi
          done

      - name: Build BIOS debug ISO
        run: |
          make clean
          bash tools/build-iso.sh \
            --arch=x86_64 \
            --variant=debug \
            --output=out/debug \
            --staging=staging \
            --initrd-compress=none \
            --jobs="$(nproc)"

      - name: Build UEFI release ISO
        run: |
          make clean
          bash tools/build-iso.sh \
            --arch=x86_64 \
            --variant=release \
            --output=out/uefi \
            --staging=staging \
            --initrd-compress=none \
            --jobs="$(nproc)" \
            --uefi

      - name: Upload ISO artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-iso-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            out/**/*.iso
            out/**/*.sha256
            out/**/*.md5
            out/**/*.json
            out/**/build-*.log
            test-logs/*.log

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## ISO Build Summary"
            echo
            echo "### Generated files"
            if [ -d out ]; then
              find out -type f | sort | sed 's/^/- `/' | sed 's/$/`/'
            else
              echo "- No output directory created"
            fi
            echo
            echo "### Smoke test markers"
            if [ -f test-logs/qemu-release.log ]; then
              grep -E "booting|BIST passed|init complete" test-logs/qemu-release.log | sed 's/^/- /' || true
            else
              echo "- Smoke test log not found"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
